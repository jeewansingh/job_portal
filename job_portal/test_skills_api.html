<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Skills API</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        button {
            background: #6366f1;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #4f46e5;
        }
        .success {
            color: #10b981;
            font-weight: 600;
        }
        .error {
            color: #ef4444;
            font-weight: 600;
        }
        pre {
            background: #f9fafb;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 12px;
        }
        .skill-item {
            padding: 8px;
            border-bottom: 1px solid #e5e7eb;
        }
        .skill-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Skills API Test</h1>
        <p>This page tests the <code>GET /skills</code> endpoint.</p>
        <button onclick="testSkillsAPI()">Test Skills API</button>
        <div id="result" style="margin-top: 20px;"></div>
    </div>

    <div class="card" id="skillsList" style="display: none;">
        <h2>Skills Data</h2>
        <div id="skillsContent"></div>
    </div>

    <script>
        async function testSkillsAPI() {
            const resultDiv = document.getElementById('result');
            const skillsListDiv = document.getElementById('skillsList');
            const skillsContentDiv = document.getElementById('skillsContent');
            
            resultDiv.innerHTML = '<p>Testing... Please wait.</p>';
            skillsListDiv.style.display = 'none';
            
            try {
                console.log('Fetching skills from http://localhost:8000/skills');
                
                const response = await fetch('http://localhost:8000/skills');
                
                console.log('Response status:', response.status);
                console.log('Response headers:', Object.fromEntries(response.headers.entries()));
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const skills = await response.json();
                
                console.log('Skills received:', skills);
                
                resultDiv.innerHTML = `
                    <p class="success">✓ Success!</p>
                    <p>Fetched ${skills.length} skills from the backend.</p>
                `;
                
                if (skills.length > 0) {
                    skillsListDiv.style.display = 'block';
                    skillsContentDiv.innerHTML = `
                        <p><strong>Total skills:</strong> ${skills.length}</p>
                        <div>
                            ${skills.map(skill => `
                                <div class="skill-item">
                                    <strong>ID ${skill.id}:</strong> ${skill.name}
                                    ${skill.category ? `<span style="color: #6b7280;"> (${skill.category})</span>` : ''}
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else {
                    skillsContentDiv.innerHTML = `
                        <p class="error">⚠️ Skills table is empty!</p>
                        <p>Run the populate script:<br>
                        <code>psql -U postgres -d job_portal -f backend/populate_skills.sql</code></p>
                    `;
                    skillsListDiv.style.display = 'block';
                }
                
            } catch (error) {
                console.error('Error:', error);
                
                resultDiv.innerHTML = `
                    <p class="error">✗ Error: ${error.message}</p>
                    <p><strong>Possible issues:</strong></p>
                    <ul>
                        <li>Backend server not running on http://localhost:8000</li>
                        <li>CORS not configured properly</li>
                        <li>Skills endpoint not registered</li>
                    </ul>
                    <p><strong>Check:</strong></p>
                    <ol>
                        <li>Backend running: <code>uvicorn app.main:app --reload</code></li>
                        <li>Visit: <a href="http://localhost:8000/docs" target="_blank">http://localhost:8000/docs</a></li>
                        <li>Check browser console (F12) for detailed errors</li>
                    </ol>
                `;
            }
        }
    </script>
</body>
</html>
